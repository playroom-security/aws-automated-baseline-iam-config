WSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS Baseline IAM - Account Password Policy
  Configures a strong IAM account password policy via a Lambda-backed custom
  resource (no native CloudFormation resource exists for this).
 
Parameters:
  MinimumPasswordLength:
    Type: Number
    Default: 14
    MinValue: 8
    MaxValue: 128
 
  MaxPasswordAge:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 1095
    Description: Days before a password expires (0 = never expires).
 
  PasswordReusePrevention:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 24
    Description: Number of previous passwords users cannot reuse.
 
  RequireUppercaseCharacters:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
 
  RequireLowercaseCharacters:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
 
  RequireNumbers:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
 
  RequireSymbols:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
 
  AllowUsersToChangePassword:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
 
  HardExpiry:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      When true, prevents IAM users from choosing a new password after their
      current password has expired — an admin must reset it.
 
Resources:
 
  # ── Lambda execution role ──────────────────────────────────────────────────
  PasswordPolicyLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'iam-password-policy-lambda-${AWS::AccountId}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ManageAccountPasswordPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:UpdateAccountPasswordPolicy
                  - iam:DeleteAccountPasswordPolicy
                  - iam:GetAccountPasswordPolicy
                Resource: '*'
 
  # ── Lambda function (inline) ───────────────────────────────────────────────
  PasswordPolicyFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'iam-password-policy-${AWS::AccountId}'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt PasswordPolicyLambdaRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
 
          iam = boto3.client('iam')
 
          def handler(event, context):
              props = event.get('ResourceProperties', {})
              request_type = event['RequestType']
              try:
                  if request_type in ('Create', 'Update'):
                      iam.update_account_password_policy(
                          MinimumPasswordLength=int(props['MinimumPasswordLength']),
                          RequireUppercaseCharacters=props['RequireUppercaseCharacters'] == 'true',
                          RequireLowercaseCharacters=props['RequireLowercaseCharacters'] == 'true',
                          RequireNumbers=props['RequireNumbers'] == 'true',
                          RequireSymbols=props['RequireSymbols'] == 'true',
                          AllowUsersToChangePassword=props['AllowUsersToChangePassword'] == 'true',
                          HardExpiry=props['HardExpiry'] == 'true',
                          MaxPasswordAge=int(props['MaxPasswordAge']),
                          PasswordReusePrevention=int(props['PasswordReusePrevention']),
                      )
                  elif request_type == 'Delete':
                      try:
                          iam.delete_account_password_policy()
                      except iam.exceptions.NoSuchEntityException:
                          pass  # already gone — not an error
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as exc:
                  print(f'Error: {exc}')
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(exc)})
 
  # ── Custom resource ────────────────────────────────────────────────────────
  AccountPasswordPolicy:
    Type: Custom::AccountPasswordPolicy
    Properties:
      ServiceToken: !GetAtt PasswordPolicyFunction.Arn
      MinimumPasswordLength:     !Ref MinimumPasswordLength
      RequireUppercaseCharacters: !Ref RequireUppercaseCharacters
      RequireLowercaseCharacters: !Ref RequireLowercaseCharacters
      RequireNumbers:            !Ref RequireNumbers
      RequireSymbols:            !Ref RequireSymbols
      AllowUsersToChangePassword: !Ref AllowUsersToChangePassword
      HardExpiry:                !Ref HardExpiry
      MaxPasswordAge:            !Ref MaxPasswordAge
      PasswordReusePrevention:   !Ref PasswordReusePrevention
 
Outputs:
  PasswordPolicyFunctionArn:
    Description: ARN of the Lambda function managing the account password policy
    Value: !GetAtt PasswordPolicyFunction.Arn